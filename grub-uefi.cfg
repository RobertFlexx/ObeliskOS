#
# Obelisk OS - GRUB config embedded in BOOTX64.EFI (UEFI ISO / USB)
# From Axioms, Order.
#
# Multiboot2 framebuffer: kernel requests a mode via boot.S; GRUB needs GOP/UGA
# modules (see top-level Makefile grub-mkstandalone --modules) or you get
# "no suitable video mode found" and no /dev/fb0 on bare metal.

set timeout=3
set default=0

insmod all_video
insmod efi_gop
insmod efi_uga
insmod video

set gfxmode=auto
set gfxpayload=keep
terminal_output console

search --file --set=root /boot/kernel.elf

menuentry "Obelisk OS" {
    multiboot2 /boot/kernel.elf
    module2 /boot/rootfs.tar rootfs
    boot
}
