# obeliskd init configuration
# key=value format

profile=production
verbose=yes

# Comma-separated unit files
services=/etc/obelisk/initd/services/motd.svc,/etc/obelisk/initd/services/identity.svc

# Default interactive session user
default_user=obelisk
default_uid=1000
default_gid=1000

# Login shell command
shell=/bin/busybox
shell_arg0=busybox
shell_arg1=sh
