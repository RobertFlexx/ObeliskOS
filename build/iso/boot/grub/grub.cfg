#
# Obelisk OS - GRUB Configuration
# From Axioms, Order.
#

set timeout=3
set default=0
set gfxpayload=text
terminal_output console

menuentry "Obelisk OS" {
    multiboot2 /boot/kernel.elf
    module2 /boot/rootfs.tar rootfs
    boot
}

menuentry "Obelisk OS (Debug Mode)" {
    multiboot2 /boot/kernel.elf debug
    module2 /boot/rootfs.tar rootfs
    boot
}

menuentry "Obelisk OS (Safe Mode)" {
    multiboot2 /boot/kernel.elf safe nopolicy
    module2 /boot/rootfs.tar rootfs
    boot
}

menuentry "Obelisk OS Installer (TUI)" {
    multiboot2 /boot/kernel.elf obelisk.installer=tui
    module2 /boot/rootfs.tar rootfs
    boot
}

menuentry "Obelisk OS Installer (CLI)" {
    multiboot2 /boot/kernel.elf obelisk.installer=cli
    module2 /boot/rootfs.tar rootfs
    boot
}